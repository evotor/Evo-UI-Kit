<div
    class="evo-tooltip"
    [class]="'evo-tooltip_' + position()"
    [class.evo-tooltip_not-arrow]="!visibleArrow()"
    [style]="styles()"
>
    @if (stringContent(); as content) {
        {{ content }}
    } @else {
        @if (templateContent(); as content) {
            <ng-container [ngTemplateOutlet]="content"/>
        }
    }
</div>
