<div class="evo-file">
    <a
        (click)="onLabelClick($event)"
        *ngIf="downloadUrl || isClickable; else nonClickedFileNameTemplate"
        [class.evo-file__label_disabled]="disabled"
        [downloadLabel]="fileLabel"
        [href]="downloadUrl || ''"
        class="evo-file__label"
        evoFileDownload
    >
        <ng-container *ngTemplateOutlet="fileNameTemplate"></ng-container>
    </a>

    <ng-template #nonClickedFileNameTemplate>
        <div class="evo-file__label">
            <ng-container *ngTemplateOutlet="fileNameTemplate"></ng-container>
        </div>
    </ng-template>

    <span *ngIf="isUploadedPercentagesVisible" class="evo-file__additional-info">{{uploadedPercentages}}%</span>
    <span *ngIf="isFileSizeVisible" class="evo-file__additional-info">{{fileSizeInfo.formattedSize}}</span>

    <span *ngIf="hasRefreshButton" class="evo-file__upload-error-message">
        Не&nbsp;загружен
    </span>

    <button
        (click)="onCancelUploadClick($event)"
        *ngIf="hasCancelButton"
        [disabled]="disabled"
        class="evo-file__button"
        evo-icon-button
    >
        <evo-icon shape="close"></evo-icon>
    </button>

    <button
        (click)="onUploadRefreshClick($event)"
        *ngIf="hasRefreshButton"
        [disabled]="disabled"
        class="evo-file__button"
        evo-icon-button
    >
        <evo-icon shape="refresh"></evo-icon>
    </button>

    <button
        (click)="onDeleteFileClick($event)"
        *ngIf="isFileUploaded"
        [disabled]="disabled"
        class="evo-file__button"
        evo-icon-button
    >
        <evo-icon shape="delete"></evo-icon>
    </button>
</div>

<ng-template #fileNameTemplate>
    <span class="evo-file__name">{{fileName}}</span>
    <span class="evo-file__extension">{{fileExtension}}</span>
</ng-template>
